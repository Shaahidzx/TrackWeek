<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackWeek Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #FF4747;
            --bg-color: #0F0F0F;
            --card-bg: #1A1A1A;
            --border-color: #2A2A2A;
            --secondary-text: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: white;
            overflow-x: hidden;
        }

        /* Better Scrollbar for the horizontal grid */
        #weekly-grid::-webkit-scrollbar { height: 6px; }
        #weekly-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .day-column {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease;
        }

        .task-card {
            background-color: #242424;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .task-card:hover {
            border-color: #444;
            transform: translateX(4px);
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid var(--secondary-text);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-card.done .checkbox-custom {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .task-card.done .task-text {
            text-decoration: line-through;
            color: var(--secondary-text);
        }

        /* Drag & Drop Visuals */
        .dragging { opacity: 0.4; scale: 0.95; }
        .drag-target { border: 2px dashed var(--accent-color) !important; background: rgba(255, 71, 71, 0.05); }

        .sidebar-open #main-wrapper { margin-right: 20rem; }
    </style>
</head>
<body class="p-0">

    <div id="someday-sidebar" class="fixed top-0 right-0 h-full w-80 translate-x-full transition-transform duration-300 ease-in-out p-6 z-50 bg-[#0A0A0A] border-l border-[#222] overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold tracking-tighter text-red-500">SOMEDAY</h2>
            <button onclick="App.toggleSidebar()" class="text-gray-400 hover:text-white">&times;</button>
        </div>
        <div id="someday-container" class="space-y-6"></div>
        <button onclick="App.addSomedayList()" class="w-full mt-6 p-3 border border-dashed border-gray-700 text-gray-500 hover:text-white hover:border-white transition-all rounded-lg text-sm">
            + NEW LIST
        </button>
    </div>

    <div id="main-wrapper" class="transition-all duration-300 p-6 md:p-12 max-w-[1600px] mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-[#222] pb-8">
            <div>
                <h1 class="text-5xl font-black tracking-tighter italic" style="color: var(--accent-color);">TRACKWEEK</h1>
                <p class="text-gray-500 text-sm mt-2 uppercase tracking-widest">Focus on the now.</p>
            </div>
            <button onclick="App.toggleSidebar()" class="bg-white text-black font-bold px-6 py-2 rounded-full hover:bg-red-500 hover:text-white transition-colors">
                LISTS
            </button>
        </header>

        <div id="weekly-grid" class="flex flex-row overflow-x-auto gap-6 pb-8"></div>
    </div>

    <script>
        const App = {
            state: {
                tasks: {},
                nextId: 1,
                sidebarOpen: false
            },

            init() {
                this.load();
                this.rollover();
                this.render();
                console.log("App Initialized.");
            },

            // --- Core Logic ---
            async rollover() {
                const today = new Date().toISOString().slice(0, 10);
                const lastVisit = localStorage.getItem('last_visit');
                
                if (lastVisit && lastVisit !== today) {
                    // Logic to find uncompleted tasks from previous days
                    Object.keys(this.state.tasks).forEach(dateKey => {
                        if (dateKey < today && !dateKey.startsWith('someday')) {
                            const uncompleted = this.state.tasks[dateKey].filter(t => !t.done);
                            if (uncompleted.length > 0) {
                                this.state.tasks[today] = [...(this.state.tasks[today] || []), ...uncompleted];
                                this.state.tasks[dateKey] = this.state.tasks[dateKey].filter(t => t.done);
                            }
                        }
                    });
                }
                localStorage.setItem('last_visit', today);
                this.save();
            },

            // --- UI Methods ---
            render() {
                const grid = document.getElementById('weekly-grid');
                grid.innerHTML = '';

                for (let i = 0; i < 7; i++) {
                    const date = new Date();
                    date.setDate(date.getDate() + i);
                    const key = date.toISOString().slice(0, 10);
                    grid.appendChild(this.createColumn(key, date, i === 0));
                }
                this.renderSomeday();
                this.setupDragEvents();
            },

            createColumn(key, date, isToday) {
                const col = document.createElement('div');
                col.className = `day-column min-w-[320px] rounded-xl p-5 flex flex-col`;
                const displayDate = date.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
                
                col.innerHTML = `
                    <div class="mb-6">
                        <span class="text-xs font-bold uppercase tracking-widest ${isToday ? 'text-red-500' : 'text-gray-500'}">
                            ${isToday ? 'Today' : 'Upcoming'}
                        </span>
                        <h3 class="text-lg font-bold">${displayDate}</h3>
                    </div>
                    <div class="task-list space-y-2 flex-grow min-h-[200px]" data-list="${key}">
                        ${this.renderTasks(key)}
                    </div>
                    <input type="text" placeholder="Add task..." 
                        class="bg-transparent border-t border-gray-800 pt-4 mt-4 outline-none text-sm focus:placeholder-transparent"
                        onkeydown="App.handleNewTask(event, '${key}')">
                `;
                return col;
            },

            renderTasks(key) {
                const tasks = this.state.tasks[key] || [];
                return tasks.map(t => `
                    <div class="task-card p-3 rounded-lg flex items-center justify-between group" 
                         draggable="true" data-id="${t.id}" data-list="${key}">
                        <div class="flex items-center gap-3">
                            <div class="checkbox-custom" onclick="App.toggleTask(${t.id}, '${key}')"></div>
                            <span class="task-text text-sm font-light">${t.text}</span>
                        </div>
                        <button onclick="App.deleteTask(${t.id}, '${key}')" class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-500 transition-opacity">
                            &times;
                        </button>
                    </div>
                `).join('');
            },

            // --- Event Handlers ---
            handleNewTask(e, key) {
                if (e.key === 'Enter' && e.target.value.trim()) {
                    const task = { id: this.state.nextId++, text: e.target.value, done: false };
                    this.state.tasks[key] = [...(this.state.tasks[key] || []), task];
                    e.target.value = '';
                    this.save();
                    this.render();
                }
            },

            toggleTask(id, key) {
                const task = this.state.tasks[key].find(t => t.id === id);
                task.done = !task.done;
                this.save();
                this.render();
            },

            toggleSidebar() {
                const sb = document.getElementById('someday-sidebar');
                this.state.sidebarOpen = !this.state.sidebarOpen;
                sb.classList.toggle('translate-x-full');
                document.body.classList.toggle('sidebar-open');
            },

            // --- Drag & Drop ---
            setupDragEvents() {
                const cards = document.querySelectorAll('.task-card');
                const lists = document.querySelectorAll('.task-list');

                cards.forEach(card => {
                    card.addEventListener('dragstart', () => card.classList.add('dragging'));
                    card.addEventListener('dragend', () => card.classList.remove('dragging'));
                });

                lists.forEach(list => {
                    list.addEventListener('dragover', e => {
                        e.preventDefault();
                        list.classList.add('drag-target');
                    });
                    list.addEventListener('dragleave', () => list.classList.remove('drag-target'));
                    list.addEventListener('drop', (e) => {
                        const taskId = document.querySelector('.dragging').dataset.id;
                        const sourceList = document.querySelector('.dragging').dataset.list;
                        const targetList = list.dataset.list;
                        this.moveTask(parseInt(taskId), sourceList, targetList);
                    });
                });
            },

            moveTask(id, from, to) {
                if (from === to) return;
                const taskIndex = this.state.tasks[from].findIndex(t => t.id === id);
                const [task] = this.state.tasks[from].splice(taskIndex, 1);
                this.state.tasks[to] = [...(this.state.tasks[to] || []), task];
                this.save();
                this.render();
            },

            // --- Storage ---
            save() {
                localStorage.setItem('trackweek_data', JSON.stringify(this.state));
            },
            load() {
                const data = localStorage.getItem('trackweek_data');
                if (data) this.state = JSON.parse(data);
            }
        };

        window.onload = () => App.init();
    </script>
<div id="focus-overlay" class="flex flex-col items-center justify-center text-center p-6">
    <button onclick="App.closeFocus()" class="absolute top-10 right-10 text-gray-500 hover:text-white text-4xl">&times;</button>
    
    <div class="mb-4">
        <span id="focus-task-tag" class="text-red-500 border border-red-500 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Focusing</span>
    </div>
    
    <h2 id="focus-task-text" class="text-4xl md:text-6xl font-black mb-12 max-w-3xl leading-tight"></h2>
    
    <div class="timer-display mb-12" id="timer-count">25:00</div>
    
    <div class="flex gap-4">
        <button id="timer-toggle" onclick="App.toggleTimer()" class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-red-500 hover:text-white transition-all">START SESSION</button>
        <button onclick="App.resetTimer()" class="border border-gray-700 px-10 py-4 rounded-full font-bold hover:border-white transition-all">RESET</button>
    </div>
</div>



</body>
</html>
